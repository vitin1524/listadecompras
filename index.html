<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="src/icons/favicon.ico" type="image/x-icon">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="src/CSS/index.css">
    <title>Lista 2026</title>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 class="titulo">Lista de compras</h2>
            <button class="btn-sair" id="btnSair">Sair</button>
        </div>
        
        <!-- Contador de itens -->
        <div class="contador" id="contador">
            <span class="contador-numero" id="contadorNumero">0</span> 
            <span class="contador-texto">itens na lista</span>
        </div>
        
        <input type="text" id="item" class="input-item" placeholder="Digite o item e pressione Enter" autocomplete="off">
        
        <ul id="lista" class="lista-itens">
            <!-- Itens serão inseridos aqui -->
        </ul>
    </div>

    <script>
        // ============ CONFIGURAÇÃO ============
        const imagensItens = {
            'leite': '🥛',
            'pão': '🍞',
            'pao': '🍞',
            'arroz': '🍚',
            'feijão': '🫘',
            'feijao': '🫘',
            'carne': '🥩',
            'frango': '🍗',
            'peixe': '🐟',
            'ovo': '🥚',
            'ovos': '🥚',
            'queijo': '🧀',
            'presunto': '🥓',
            'manteiga': '🧈',
            'iogurte': '🍶',
            'café': '☕',
            'cafe': '☕',
            'açúcar': '🍬',
            'acucar': '🍬',
            'sal': '🧂',
            'óleo': '🫒',
            'oleo': '🫒',
            'macarrão': '🍝',
            'macarrao': '🍝',
            'molho': '🥫',
            'tomate': '🍅',
            'cebola': '🧅',
            'alho': '🧄',
            'batata': '🥔',
            'cenoura': '🥕',
            'alface': '🥬',
            'banana': '🍌',
            'maçã': '🍎',
            'maca': '🍎',
            'laranja': '🍊',
            'uva': '🍇',
            'morango': '🍓',
            'abacaxi': '🍍',
            'melancia': '🍉',
            'biscoito': '🍪',
            'bolacha': '🍪',
            'chocolate': '🍫',
            'sorvete': '🍦',
            'água': '💧',
            'agua': '💧',
            'refrigerante': '🥤',
            'cerveja': '🍺',
            'vinho': '🍷',
            'suco': '🧃',
            'detergente': '🧴',
            'sabão': '🧼',
            'sabao': '🧼',
            'sabonete': '🧼',
            'shampoo': '🧴',
            'papel higiênico': '🧻',
            'papel higienico': '🧻',
            'pasta de dente': '🪥',
            'escova de dente': '🪥',
            'amaciante': '🧴',
            'água sanitária': '🧪',
            'agua sanitaria': '🧪',
            'ração': '🐾',
            'racao': '🐾'
        };

        // ============ VARIÁVEIS DE CONTROLE ============
        let processando = false;
        const inputItem = document.getElementById('item');
        const lista = document.getElementById('lista');
        const contadorNumero = document.getElementById('contadorNumero');
        const btnSair = document.getElementById('btnSair');

        // ============ FUNÇÕES ============
        function getImagem(itemNome) {
            const nomeLower = itemNome.toLowerCase().trim();
            return imagensItens[nomeLower] || '🛒';
        }

        function adicionarItem() {
            // Bloqueia completamente se já estiver processando
            if (processando) {
                return;
            }

            const nomeItem = inputItem.value.trim();
            
            if (nomeItem === '') {
                return;
            }

            // Ativa o bloqueio ANTES de qualquer coisa
            processando = true;

            const imagem = getImagem(nomeItem);
            
            const li = document.createElement('li');
            li.innerHTML = `
                <div class="item-info">
                    <span class="item-imagem">${imagem}</span>
                    <span class="item-nome">${nomeItem}</span>
                </div>
                <button class="btn-remover">🗑️</button>
            `;
            
            // Evento de remover
            li.querySelector('.btn-remover').addEventListener('click', function() {
                li.style.animation = 'fadeOut 0.3s ease';
                setTimeout(() => {
                    li.remove();
                    atualizarContador();
                }, 250);
            });
            
            lista.appendChild(li);
            
            // Limpa o campo
            inputItem.value = '';
            
            atualizarContador();
            
            // Mantém o foco no input
            inputItem.focus();
            
            // Libera o bloqueio após um tempo seguro
            setTimeout(() => {
                processando = false;
            }, 500);
        }

        function atualizarContador() {
            const totalItens = lista.children.length;
            contadorNumero.textContent = totalItens;
            
            contadorNumero.style.transform = 'scale(1.3)';
            setTimeout(() => {
                contadorNumero.style.transform = 'scale(1)';
            }, 200);
        }

        function fazerLogout() {
            localStorage.removeItem('usuarioLogado');
            sessionStorage.clear();
            window.location.href = 'login.html';
        }

        // ============ EVENTOS ============
        
        // Evento Enter no input - ÚNICO local que chama adicionarItem
        inputItem.addEventListener('keydown', function(evento) {
            if (evento.key === 'Enter') {
                evento.preventDefault();
                evento.stopPropagation();
                adicionarItem();
            }
        });

        // Previne qualquer outro evento de tecla no input
        inputItem.addEventListener('keyup', function(evento) {
            if (evento.key === 'Enter') {
                evento.preventDefault();
                evento.stopPropagation();
            }
        });

        // Previne o evento keypress (pode causar duplicação)
        inputItem.addEventListener('keypress', function(evento) {
            if (evento.key === 'Enter') {
                evento.preventDefault();
                evento.stopPropagation();
            }
        });

        // Evento do botão Sair
        btnSair.addEventListener('click', function() {
            if (typeof logout === 'function') {
                logout();
            } else {
                fazerLogout();
            }
        });

        // ============ SERVICE WORKER ============
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(registration => {
                        console.log('ServiceWorker registrado com sucesso:', registration.scope);
                    })
                    .catch(error => {
                        console.log('Falha ao registrar o ServiceWorker:', error);
                    });
            });
        }
    </script>
</body>
</html>
