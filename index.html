<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="src/icons/favicon.ico" type="image/x-icon">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="src/CSS/index.css">
    <title>Lista 2026</title>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 class="titulo">Lista de compras</h2>
            <div class="header-botoes">
                <button class="btn-limpar" id="btnLimparTudo">🧹 Limpar tudo</button>
                <button class="btn-sair" id="btnSair">Sair</button>
            </div>
        </div>
        
        <!-- Contador de itens -->
        <div class="contador" id="contador">
            <span class="contador-numero" id="contadorNumero">0</span> 
            <span class="contador-texto">itens na lista</span>
        </div>
        
        <input type="text" id="item" class="input-item" placeholder="Digite o item e pressione Enter" autocomplete="off">
        
        <ul id="lista" class="lista-itens">
            <!-- Itens serão inseridos aqui -->
        </ul>
    </div>

    <script>
        // ============ CONFIGURAÇÃO ============
        const imagensItens = {
            'leite': '🥛',
            'pão': '🍞',
            'pao': '🍞',
            'arroz': '🍚',
            'feijão': '🫘',
            'feijao': '🫘',
            'carne': '🥩',
            'frango': '🍗',
            'peixe': '🐟',
            'ovo': '🥚',
            'ovos': '🥚',
            'queijo': '🧀',
            'presunto': '🥓',
            'manteiga': '🧈',
            'iogurte': '🍶',
            'café': '☕',
            'cafe': '☕',
            'açúcar': '🍬',
            'acucar': '🍬',
            'sal': '🧂',
            'óleo': '🫒',
            'oleo': '🫒',
            'macarrão': '🍝',
            'macarrao': '🍝',
            'molho': '🥫',
            'tomate': '🍅',
            'cebola': '🧅',
            'alho': '🧄',
            'batata': '🥔',
            'cenoura': '🥕',
            'alface': '🥬',
            'banana': '🍌',
            'maçã': '🍎',
            'maca': '🍎',
            'laranja': '🍊',
            'uva': '🍇',
            'morango': '🍓',
            'abacaxi': '🍍',
            'melancia': '🍉',
            'biscoito': '🍪',
            'bolacha': '🍪',
            'chocolate': '🍫',
            'sorvete': '🍦',
            'água': '💧',
            'agua': '💧',
            'refrigerante': '🥤',
            'cerveja': '🍺',
            'vinho': '🍷',
            'suco': '🧃',
            'detergente': '🧴',
            'sabão': '🧼',
            'sabao': '🧼',
            'sabonete': '🧼',
            'shampoo': '🧴',
            'papel higiênico': '🧻',
            'papel higienico': '🧻',
            'pasta de dente': '🪥',
            'escova de dente': '🪥',
            'amaciante': '🧴',
            'água sanitária': '🧪',
            'agua sanitaria': '🧪',
            'ração': '🐾',
            'racao': '🐾'
        };

        // ============ VARIÁVEIS DE CONTROLE ============
        let processando = false;
        const inputItem = document.getElementById('item');
        const lista = document.getElementById('lista');
        const contadorNumero = document.getElementById('contadorNumero');
        const btnSair = document.getElementById('btnSair');
        const btnLimparTudo = document.getElementById('btnLimparTudo');

        // ============ FUNÇÕES ============
        function getImagem(itemNome) {
            const nomeLower = itemNome.toLowerCase().trim();
            return imagensItens[nomeLower] || '🛒';
        }

        function adicionarItem() {
            if (processando) {
                return;
            }

            const nomeItem = inputItem.value.trim();
            
            if (nomeItem === '') {
                return;
            }

            processando = true;

            const imagem = getImagem(nomeItem);
            
            const li = document.createElement('li');
            li.innerHTML = `
                <div class="item-info">
                    <span class="item-imagem">${imagem}</span>
                    <div class="item-detalhes">
                        <span class="item-nome">${nomeItem}</span>
                        <div class="quantidade-controle">
                            <button class="qtd-btn qtd-menos">−</button>
                            <span class="qtd-valor">1</span>
                            <button class="qtd-btn qtd-mais">+</button>
                        </div>
                    </div>
                </div>
                <button class="btn-remover">🗑️</button>
            `;
            
            // Eventos dos botões de quantidade
            const qtdValor = li.querySelector('.qtd-valor');
            const qtdMenos = li.querySelector('.qtd-menos');
            const qtdMais = li.querySelector('.qtd-mais');
            
            qtdMenos.addEventListener('click', function() {
                let qtd = parseInt(qtdValor.textContent);
                if (qtd > 1) {
                    qtd--;
                    qtdValor.textContent = qtd;
                }
            });
            
            qtdMais.addEventListener('click', function() {
                let qtd = parseInt(qtdValor.textContent);
                if (qtd < 99) {
                    qtd++;
                    qtdValor.textContent = qtd;
                }
            });
            
            // Evento de remover
            li.querySelector('.btn-remover').addEventListener('click', function() {
                li.style.animation = 'fadeOut 0.3s ease';
                setTimeout(() => {
                    li.remove();
                    atualizarContador();
                }, 250);
            });
            
            lista.appendChild(li);
            
            inputItem.value = '';
            
            atualizarContador();
            
            inputItem.focus();
            
            setTimeout(() => {
                processando = false;
            }, 500);
        }

        function limparTudo() {
            if (lista.children.length === 0) return;
            
            if (confirm('Tem certeza que deseja remover TODOS os itens da lista?')) {
                const itens = lista.querySelectorAll('li');
                itens.forEach((item, index) => {
                    setTimeout(() => {
                        item.style.animation = 'fadeOut 0.3s ease';
                        setTimeout(() => {
                            item.remove();
                            if (index === itens.length - 1) {
                                atualizarContador();
                            }
                        }, 250);
                    }, index * 100);
                });
            }
        }

        function atualizarContador() {
            const totalItens = lista.children.length;
            contadorNumero.textContent = totalItens;
            
            contadorNumero.style.transform = 'scale(1.3)';
            setTimeout(() => {
                contadorNumero.style.transform = 'scale(1)';
            }, 200);
        }

        function fazerLogout() {
            localStorage.removeItem('usuarioLogado');
            sessionStorage.clear();
            window.location.href = 'login.html';
        }

        // ============ EVENTOS ============
        
        inputItem.addEventListener('keydown', function(evento) {
            if (evento.key === 'Enter') {
                evento.preventDefault();
                evento.stopPropagation();
                adicionarItem();
            }
        });

        inputItem.addEventListener('keyup', function(evento) {
            if (evento.key === 'Enter') {
                evento.preventDefault();
                evento.stopPropagation();
            }
        });

        inputItem.addEventListener('keypress', function(evento) {
            if (evento.key === 'Enter') {
                evento.preventDefault();
                evento.stopPropagation();
            }
        });

        btnSair.addEventListener('click', function() {
            if (typeof logout === 'function') {
                logout();
            } else {
                fazerLogout();
            }
        });

        btnLimparTudo.addEventListener('click', function() {
            limparTudo();
        });

        // ============ SERVICE WORKER ============
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(registration => {
                        console.log('ServiceWorker registrado com sucesso:', registration.scope);
                    })
                    .catch(error => {
                        console.log('Falha ao registrar o ServiceWorker:', error);
                    });
            });
        }
    </script>
</body>
</html>
